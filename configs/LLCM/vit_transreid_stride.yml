MODEL:
  PRETRAIN_CHOICE: 'imagenet'
#  PRETRAIN_PATH: '/home/data_4t/ctm/ReID/MIP-master/vit_checkpoints/deit_base_distilled_patch16_224-df68dfff.pth'
  PRETRAIN_PATH: '/root/code/AMaP/vit_checkpoints/jx_vit_base_p16_224-80ecf9dd.pth'
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'transformer'
  NO_MARGIN: True
  DEVICE_ID: ('4')
  TRANSFORMER_TYPE: 'vit_base_patch16_224_TransReID'
  STRIDE_SIZE: [12, 12]
  SIE_CAMERA: True
  SIE_COE: 3.0
  JPM: True
  RE_ARRANGE: True

INPUT:
  #SIZE_TRAIN: [384, 144]
  #SIZE_TEST: [384, 144]
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  AUG: 0

DATASETS:
  NAMES: ('llcm')
  ROOT_DIR: ('/root/code/IDKL-main/IDKL/configs/dataset')

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 48
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 120
  BASE_LR: 0.01
  IMS_PER_BATCH: 64
  WARMUP_METHOD: 'linear'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 10
  LOG_PERIOD: 150
  EVAL_PERIOD: 1
  WEIGHT_DECAY:  1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2

TEST:
  EVAL: True
  IMS_PER_BATCH: 32
  RE_RANKING: False
  WEIGHT: 'logs/llcm_vit_transreid_stride/transformer_120.pth'
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'
  TSNE: True

OUTPUT_DIR: 'logs/llcm_vit_transreid_stride'


